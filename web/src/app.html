<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- Apply the stored (or system) theme before first paint so there's
             no flash of the wrong theme. Mirrors lib/theme.svelte.ts. -->
        <script>
            (function () {
                try {
                    var c = localStorage.getItem("eunoia.theme");
                    var dark =
                        c === "dark" ||
                        ((c === "system" || c === null) &&
                            window.matchMedia("(prefers-color-scheme: dark)")
                                .matches);
                    if (dark) document.documentElement.classList.add("dark");
                } catch (e) {}
            })();
        </script>
        <link rel="icon"
              type="image/png"
              href="%sveltekit.assets%/favicon-96x96.png"
              sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
        <link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
        <link rel="apple-touch-icon"
              sizes="180x180"
              href="%sveltekit.assets%/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Eunoia" />
        <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="Eunoia is an open-source library for generating area-proportional Euler and Venn diagrams, with bindings for R and TypeScript and a full-featured web app." />
        <meta name="theme-color"
              media="(prefers-color-scheme: light)"
              content="#ffffff" />
        <meta name="theme-color"
              media="(prefers-color-scheme: dark)"
              content="#0a0a0a" />
        <link rel="canonical" href="https://eunoia.bz/" />
        <meta property="og:site_name" content="Eunoia" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:title" content="Eunoia" />
        <meta property="og:description"
              content="Eunoia is an open-source library for generating area-proportional Euler and Venn diagrams, with bindings for R and TypeScript and a full-featured web app." />
        <meta property="og:url" content="https://eunoia.bz/" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://eunoia.bz/og.png" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt"
              content="An area-proportional Euler diagram generated by Eunoia" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Eunoia" />
        <meta name="twitter:description"
              content="Eunoia generates area-proportional Euler diagrams" />
        <meta name="twitter:image" content="https://eunoia.bz/og.png" />
        <meta name="twitter:image:alt"
              content="An area-proportional Euler diagram generated by Eunoia" />
        <title>Eunoia</title>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
