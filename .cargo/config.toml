[resolver]
# Hold transitive deps back to MSRV-compatible versions when the
# lockfile is regenerated (e.g. by versionary on release PRs).
# Without this, `cargo generate-lockfile` can pick crates whose
# `rust-version` exceeds our MSRV (currently 1.91.1, matching the
# rextendr/CRAN floor). Stabilized in Rust 1.84; opt-in under
# resolver = "2".
incompatible-rust-versions = "fallback"

# getrandom 0.4 selects its WASM backend from the `wasm_js` crate feature
# (enabled on the dependency in `crates/eunoia-wasm/Cargo.toml`), so the old
# `--cfg getrandom_backend="wasm_js"` rustflag that getrandom 0.3 required is
# no longer needed.

# Force frame pointers on native x86_64 so `perf record` (default
# call-graph mode) can unwind through inlined argmin / nalgebra frames
# without falling back to `--call-graph dwarf` (slow + huge perf.data).
# Applies to *all* native builds; the cost is one register and is
# negligible compared to the readability win on flamegraphs.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "force-frame-pointers=yes"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "force-frame-pointers=yes"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "force-frame-pointers=yes"]
