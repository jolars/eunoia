# Option A: roll-your-own JLL. Cross-compile the `eunoia-capi` cdylib for every
# Julia-supported platform from a single Ubuntu host using cargo-zigbuild, then
# attach the per-platform tarballs to the GitHub release. No BinaryBuilder, no
# Yggdrasil. `julia/Eunoia/gen/generate_artifacts.jl` turns the release assets
# into `Artifacts.toml`.
#
# Triggered by the crate's `v*` release (cut by versionary): the capi binaries
# ride along on the same release, so the normal release flow needs no extra
# step. To (re)build and attach binaries to an existing release out of band
# (e.g. after adding a platform), run the workflow manually with the
# `release_tag` input set to that release's tag.
name: Julia artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to (re)build and attach binaries to (e.g. v1.3.0). Leave blank to build only."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.julia }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # rust = rustup target; julia = Julia/BinaryPlatforms triplet;
          # glibc = optional cargo-zigbuild glibc floor; dir/lib = tarball layout.
          - { rust: x86_64-unknown-linux-gnu,   julia: x86_64-linux-gnu,     glibc: ".2.17", dir: lib, lib: libeunoia_capi.so }
          - { rust: aarch64-unknown-linux-gnu,  julia: aarch64-linux-gnu,    glibc: ".2.17", dir: lib, lib: libeunoia_capi.so }
          # musl (Alpine etc.) — Julia tags these distinctly from glibc, and zig
          # bundles the musl libc, so no musl-tools needed. No glibc floor.
          - { rust: x86_64-unknown-linux-musl,  julia: x86_64-linux-musl,    glibc: "",      dir: lib, lib: libeunoia_capi.so }
          - { rust: aarch64-unknown-linux-musl, julia: aarch64-linux-musl,   glibc: "",      dir: lib, lib: libeunoia_capi.so }
          - { rust: x86_64-apple-darwin,        julia: x86_64-apple-darwin,  glibc: "",      dir: lib, lib: libeunoia_capi.dylib }
          - { rust: aarch64-apple-darwin,      julia: aarch64-apple-darwin, glibc: "",      dir: lib, lib: libeunoia_capi.dylib }
          - { rust: x86_64-pc-windows-gnu,     julia: x86_64-w64-mingw32,   glibc: "",      dir: bin, lib: eunoia_capi.dll }
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust }}

      # rust-toolchain.toml pins this repo to 1.88.0, so dtolnay's `targets:`
      # adds rust-std to `stable` while the build runs under 1.88.0. Add the
      # cross target to the pinned toolchain explicitly (inside the checkout).
      - name: Add cross target to the pinned toolchain
        run: rustup target add ${{ matrix.rust }}

      - name: Install Zig
        # v2+ knows the post-0.14 tarball naming (`zig-<arch>-<os>-<ver>`); v1
        # builds the old `<os>-<arch>` URL, which 404s for any 0.14+ release.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build cdylib
        run: cargo zigbuild -p eunoia-capi --release --target ${{ matrix.rust }}${{ matrix.glibc }}

      - name: Package tarball
        run: |
          out="libeunoia_capi-${{ matrix.julia }}.tar.gz"
          stage="stage/${{ matrix.dir }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.rust }}/release/${{ matrix.lib }}" "$stage/"
          tar -czf "$out" -C stage .
          echo "Built $out:"; tar -tzf "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.julia }}
          path: libeunoia_capi-*.tar.gz
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build
    # On a `v*` tag push, attach to that release. On a manual run, attach only
    # when a target release tag was given (otherwise it is a build-only check).
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all tarballs
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: dist/*.tar.gz
          # Append to / refresh assets on an existing release without erroring
          # on the ones already there.
          overwrite_files: true

  notify-julia:
    name: Notify Eunoia.jl
    needs: release
    # Same guard as `release`: only when binaries were actually attached (a tag
    # push, or a manual run targeting an existing release tag).
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch artifact update to Eunoia.jl
        # The default GITHUB_TOKEN cannot trigger workflows in another repo, so
        # authenticate with a PAT / GitHub App token (fine-grained on
        # jolars/Eunoia.jl with Contents: write) stored as the
        # EUNOIA_JL_DISPATCH_TOKEN secret. Eunoia.jl's `update-artifacts.yml`
        # listens for this `eunoia-release` event and opens a PR repinning its
        # Artifacts.toml to the just-released tarballs.
        env:
          TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.EUNOIA_JL_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jolars/Eunoia.jl/dispatches \
            -d "{\"event_type\":\"eunoia-release\",\"client_payload\":{\"tag\":\"$TAG\"}}"
