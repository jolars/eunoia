name: Build and Test

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  msrv:
    name: MSRV (core crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          # Pinned to R's rextendr MSRV so the core crate stays buildable
          # by downstream R/Python/Julia packagers. eunoia-wasm legitimately
          # requires 1.85 (edition 2024) and is excluded from this job.
          toolchain: 1.84.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Strip eunoia-wasm from workspace
        # cargo 1.84.1 cannot parse edition 2024 manifests, and eunoia-wasm
        # legitimately needs edition 2024 for its WASM-only deps. Drop it
        # from `[workspace.members]` so the MSRV check sees only the core
        # crate that downstream packagers actually consume.
        run: sed -i 's|"crates/eunoia-wasm",\? *||g' Cargo.toml

      - name: Check core crate (no dev-deps)
        # `cargo check` without `--all-targets` skips test/bench targets and
        # therefore skips dev-deps. MSRV is a contract with library users,
        # not test runners — dev-deps (proptest, criterion, tempfile, …) can
        # outpace MSRV without affecting downstream builds.
        run: cargo check -p eunoia --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: llvm-tools-preview
          toolchain: 1.94.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build
        run: cargo build --workspace --verbose

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path
          lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jolars/eunoia
          fail_ci_if_error: true
          files: lcov.info

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Run doc tests
        run: cargo test --doc

  slow-tests:
    name: Slow Tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run ignored slow tests
        run: cargo test --workspace -- --ignored

  versionary:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1

      - id: versionary
        uses: jolars/versionary@v0
        with:
          github-token: ${{ secrets.RELEASE_TOKEN }}
