name: Publish npm Package

on:
  workflow_dispatch:
  push:
    tags:
      - "eunoia-npm-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC for npm provenance
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          targets: wasm32-unknown-unknown
          toolchain: 1.88.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Build WASM and prepare npm package
        run: |
          wasm-pack build crates/eunoia-wasm --target bundler --out-dir ${{ github.workspace }}/npm
          node ts/prepare-package.mjs

      - name: Build self-contained browser bundle (@jolars/eunoia/web)
        run: node ts/build-web.mjs

      - name: Publish to npm
        working-directory: npm
        run: pnpm publish --access public --no-git-checks
