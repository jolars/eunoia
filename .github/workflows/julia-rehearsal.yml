# THROWAWAY — rehearses the two-repo binary dance before splitting Eunoia.jl out.
#
# It exercises the full release -> Artifacts.toml -> lazy-fetch -> test loop
# that the split makes expensive to debug, while everything still lives in one
# repo. Manual-dispatch only; it creates a disposable *prerelease* under the
# `julia-rehearsal` tag, consumes it exactly as an external package would, and
# deletes it again. Delete this file once the loop is proven green.
name: Julia artifact rehearsal (throwaway)

on:
  workflow_dispatch:

permissions:
  contents: write # create/delete the throwaway prerelease + tag

env:
  REHEARSAL_TAG: julia-rehearsal

jobs:
  # 1. Build the per-platform tarballs — identical to julia-artifacts.yml's
  #    build job, so a green run validates that matrix too.
  build:
    name: build ${{ matrix.julia }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: x86_64-unknown-linux-gnu,  julia: x86_64-linux-gnu,     glibc: ".2.17", dir: lib, lib: libeunoia_capi.so }
          - { rust: aarch64-unknown-linux-gnu, julia: aarch64-linux-gnu,    glibc: ".2.17", dir: lib, lib: libeunoia_capi.so }
          - { rust: x86_64-apple-darwin,       julia: x86_64-apple-darwin,  glibc: "",      dir: lib, lib: libeunoia_capi.dylib }
          - { rust: aarch64-apple-darwin,      julia: aarch64-apple-darwin, glibc: "",      dir: lib, lib: libeunoia_capi.dylib }
          - { rust: x86_64-pc-windows-gnu,     julia: x86_64-w64-mingw32,   glibc: "",      dir: bin, lib: eunoia_capi.dll }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust }}

      - name: Install Zig
        # v2+ knows the post-0.14 tarball naming (`zig-<arch>-<os>-<ver>`); v1
        # builds the old `<os>-<arch>` URL, which 404s on every mirror for any
        # 0.14+ release. Pin a known-good stable Zig for reproducibility.
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build cdylib
        run: cargo zigbuild -p eunoia-capi --release --target ${{ matrix.rust }}${{ matrix.glibc }}

      - name: Package tarball
        run: |
          out="libeunoia_capi-${{ matrix.julia }}.tar.gz"
          stage="stage/${{ matrix.dir }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.rust }}/release/${{ matrix.lib }}" "$stage/"
          tar -czf "$out" -C stage .
          echo "Built $out:"; tar -tzf "$out"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.julia }}
          path: libeunoia_capi-*.tar.gz
          if-no-files-found: error

  # 2. Attach them to a disposable prerelease, exactly as the real release does.
  release:
    name: Publish throwaway prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: (Re)create the throwaway prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$REHEARSAL_TAG" --cleanup-tag --yes || true
          gh release create "$REHEARSAL_TAG" dist/*.tar.gz \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Julia artifact rehearsal (throwaway)" \
            --notes "Disposable prerelease for rehearsing the artifact pipeline. Safe to delete."

  # 3. Consume the release the way the split-out package will: regenerate
  #    Artifacts.toml, then run the suite with EUNOIA_CAPI_LIB *unset* so the
  #    library is lazily fetched from the prerelease — never built locally.
  consume:
    name: Consume via Artifacts.toml
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Regenerate Artifacts.toml from the prerelease
        run: |
          julia -e 'import Pkg; Pkg.add("ArtifactUtils")'
          julia --project=julia/Eunoia julia/Eunoia/gen/generate_artifacts.jl "$REHEARSAL_TAG"
          echo "=== Artifacts.toml ==="; cat julia/Eunoia/Artifacts.toml

      - name: Run tests against the fetched artifact (no EUNOIA_CAPI_LIB)
        run: |
          julia --project=julia/Eunoia -e 'import Pkg; Pkg.instantiate(); Pkg.test()'

  # 4. Always tear the prerelease + tag back down.
  cleanup:
    name: Delete throwaway prerelease
    needs: [release, consume]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete prerelease + tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "$REHEARSAL_TAG" --cleanup-tag --yes || true
