version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "nalgebra"
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/ts"
    schedule:
      interval: "weekly"
    groups:
      npm:
        patterns:
          - "*"
