version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Pinned below latest to preserve MSRV 1.84.1 / edition 2021
      # (R's rextendr MSRV is 1.84.1). Revisit when the MSRV floor is raised:
      # argmin 0.11 uses `is_multiple_of` (1.87); nalgebra 0.33+ needs the
      # 1.87 RealField shape; levenberg-marquardt 0.14+, i_overlay 3+, and
      # rand 0.10 are all edition 2024 (≥1.85). The whole project (workflows,
      # devenv, rust-toolchain.toml) is pinned to 1.84.1; bumping any of
      # these breaks the build globally, not just MSRV CI.
      - dependency-name: "argmin"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "argmin-math"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "nalgebra"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "levenberg-marquardt"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "i_overlay"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "rand"
        update-types: ["version-update:semver-major"]
