[package]
name = "eunoia"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "A library for creating area-proportional Euler and Venn diagrams"
keywords = ["euler", "venn", "diagram", "visualization"]
categories = ["graphics", "visualization", "mathematics"]

[lints]
workspace = true

[dependencies]
argmin = "0.10"
argmin-math = { version = "0.4", features = ["nalgebra_v0_32"] }
finitediff = "0.2.0"
i_overlay = { version = "~2.0", optional = true }
log = { version = "0.4", features = ["release_max_level_info"] }
nalgebra = "0.32"
num-complex = "0.4"
polylabel-mini = "0.1.0"
rand = "0.9"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = "1.10"

[features]
default = []
wasm = ["argmin/wasm-bindgen"]
plotting = ["dep:i_overlay"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
env_logger = "0.11"
proptest = "1"

[[bench]]
name = "initial_layout"
harness = false
